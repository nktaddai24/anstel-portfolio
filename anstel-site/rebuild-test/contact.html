<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport", content="width=device-width">
        <title>ANSTEL | Contact</title>
    </head>
    <body>
        <header>
            <h1>Contact Us</h1>
            <nav>
                <a href="index.html">Home</a> |
                <a href="about.html">About</a> |
                <a href="services.html">Services</a> |
                <a href="contact.html">Contact</a>
            </nav>
        </header>
        <main>
            <section>
                <form><br><br>
                    <label for="name">Fullname</label><br>
                    <input type="text" id="name" name="name" placeholder="eg. Addai Nketiah"><br><br>
                    <label for="phone">Phone Number</label><br>
                    <input type="tel" id="phone" name="phone" placeholder="eg. xxxxxx5990"><br><br>
                    <label for="email">Email Address</label><br>
                    <input type="email" id="email" name="email" placeholder="eg. nktaddai@gmail.com"><br><br>
                    <label for="services">Services</label><br>
                    <select id="services" name="services">
                        <option>Barbershop</option>
                        <option>Gym</option>
                        <option>Transport</option>
                    </select><br><br>
                    <label for="message">Message Us</label><br>
                    <textarea id="message" name="message" rows="10"></textarea>
                    <button type="submit">Submit</button>
                </form>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
